    <line x1="210" y1="450" x2="490" y2="550"/>
    <line x1="210" y1="550" x2="490" y2="450"/>
  </g>

  <circle cx="350" cy="500" r="10" fill="#5F52FF" filter="url(#glow)"/>
  <line x1="350" y1="500" x2="435" y2="395" stroke="url(#ring)" stroke-width="8" stroke-linecap="round"/>
  <circle cx="435" cy="395" r="4" fill="#5F52FF"/>

